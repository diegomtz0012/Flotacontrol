/* ── MANTENIMIENTO MODULE ── */

:root {
  --bg: #1c1c1e;
  --bg2: #242426;
  --bg3: #2c2c2e;
  --bg4: #3a3a3c;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --border3: rgba(255,255,255,0.18);
  --text: #f0f2f8;
  --text2: #8892a4;
  --text3: #4a5268;
  --blue: #4f8ef7;
  --blue-dim: rgba(79,142,247,0.1);
  --blue-dim2: rgba(79,142,247,0.18);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.1);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.1);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.1);
  --purple-dim2: rgba(167,139,250,0.18);
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background:#e8e4dc; color: #1a1816; min-height: 100vh; font-size: 14px; }
input, select, textarea, button { font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 58px; background:#f5f2ed; border-bottom: 1px solid rgba(90,85,80,0.15); flex-shrink: 0; }
.logo { font-size: 16px; font-weight: 700; color: #1a1816; letter-spacing: -0.5px; }
.logo span { color: #2d4e7a; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.user-chip { display: flex; align-items: center; gap: 9px; padding: 5px 14px 5px 6px; background: #d8d4cc; border: 1px solid rgba(90,85,80,0.22); border-radius: 30px; cursor: pointer; transition: border-color .15s; }
.user-chip:hover { border-color: rgba(90,85,80,0.32); }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; letter-spacing: .5px; }
.av-blue { background: rgba(45,78,122,0.18); color: #2d4e7a; }
.av-teal { background: rgba(30,96,88,0.1); color: #1e6058; }
.av-purple { background: rgba(90,50,128,0.18); color: #5a3280; }
.user-name { font-size: 13px; font-weight: 500; color: #1a1816; }

function hoy(){return new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'})}
function hora(){return new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}
function dvencer(f){const h=new Date(),d=new Date(f);return Math.ceil((d-h)/(864e5))}
function cdoc(d){return d<=30?'#a83020':d<=60?'#7a5a10':'#1e6b3a'}
function gc(){
  const v=Object.values(RES);
  // count noApto by the item's category
  let c1=0,c11=0,c2=0;
  Object.entries(RES).forEach(([id,r])=>{
    if(r.e==='noApto'){
      const sec=SECS.find(s=>s.items.some(i=>i.id===id));
      const item=sec?.items.find(i=>i.id===id);
      if(item?.c==='1')c1++;
      else if(item?.c==='1.1')c11++;
      else if(item?.c==='2')c2++;
    }
  });
  return{apto:v.filter(r=>r.e==='apto').length,c1,c11,c2};
}
function tot(){return SECS.reduce((a,s)=>a+s.items.length,0)}
function rev(){return Object.values(RES).filter(r=>r.e).length}
function sc2(sec){
  const hasNoApto=sec.items.some(i=>RES[i.id]?.e==='noApto');
  if(hasNoApto){
    // color by worst category
    const cats=sec.items.filter(i=>RES[i.id]?.e==='noApto').map(i=>i.c);
    if(cats.includes('1'))return'#f87171';
    if(cats.includes('1.1'))return'#fbbf24';
    return'#fb923c';
  }
  if(sec.items.every(i=>RES[i.id]))return'#4ade80';
  return'#4a5268';
}
function spg(sec){const d=sec.items.filter(i=>RES[i.id]).length;return`${d}/${sec.items.length}`}

function buildIt(it){
  const r=RES[it.id],e=r?.e,hf=r?.foto,obs=r?.obs||'';
  const noApto=e==='noApto';
  const catColor={'1':'#a83020','1.1':'#7a5a10','2':'#9a4810'}[it.c]||'#6b6560';
  const catBg={'1':'rgba(248,113,113,.12)','1.1':'rgba(251,191,36,.12)','2':'rgba(251,146,60,.1)'}[it.c]||'#ccc9c0';
  const catLabel={'1':'CAT. 1 · NO APTO INMEDIATO','1.1':'CAT. 1.1 · Plazo 7 días','2':'CAT. 2 · Plazo 15 días'}[it.c]||'';
  const catNoAptoCls = noApto ? ({'1':'n1','1.1':'n11','2':'n2'}[it.c]||'n1') : '';
  const cls=noApto?catNoAptoCls:e==='apto'?'ok':'';
  return`<div class="ip ${cls}" id="it-${it.id}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="il">${it.l}</span>
        ${it.o?'<span class="iopc">Opcional</span>':''}
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${catBg};color:${catColor};letter-spacing:.04em;flex-shrink:0">${catLabel}</span>
      </div>
      ${noApto?`
        <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
          <textarea id="obs-${it.id}" placeholder="Describa la falla observada..." style="width:100%;background:#ccc9c0;border:1px solid rgba(248,113,113,.3);border-radius:var(--radius);padding:9px 12px;color:#1a1816;font-size:13px;outline:none;resize:none;min-height:60px;font-family:'DM Sans',sans-serif;" onchange="setObs('${it.id}',this.value)">${obs}</textarea>
          <button class="fb vis ${hf?'hf':'fo'}" id="fb-${it.id}" onclick="adjF('${it.id}')" style="align-self:flex-start">
            ${S.cam} ${hf?'📷 Foto adjunta':'📷 Adjuntar foto (obligatorio)'}
          </button>
        </div>`:''}
    </div>
    <div class="ibs" style="flex-shrink:0;margin-left:12px">
      <button class="cb2 ${e==='apto'?'sa2':''}" onclick="setE('${it.id}','apto')" style="min-width:70px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Apto
      </button>
      <button class="cb2 ${noApto?'s1':''}" onclick="setE('${it.id}','noApto')" style="min-width:80px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> No Apto
      </button>
      ${it.o?`<button class="cb2 ${e==='na'?'sna':''}" onclick="setE('${it.id}','na')" style="min-width:50px">N/A</button>`:''}
    </div>
  </div>`;
}

function guardarNota(){
  const placa = (document.getElementById('nota-placa')?.value||'').toUpperCase().trim();
  const tipo  = document.getElementById('nota-tipo')?.value||'servicio';
  const texto = document.getElementById('nota-texto')?.value||'';
  if(!placa || !texto){alert('Por favor ingresa la placa y la descripción de la nota.');return;}
  if(!NOTAS_MAESTRO[placa]) NOTAS_MAESTRO[placa]=[];
  NOTAS_MAESTRO[placa].push({tipo,texto,fecha:new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}),autor:'Maestro Mant.'});
  alert('Nota guardada correctamente. El inspector la verá la próxima vez que inspeccione el vehículo '+placa+'.');
  navigate('notas-m');
}

function eliminarNota(placa, textoInicio){
  if(!NOTAS_MAESTRO[placa])return;
  NOTAS_MAESTRO[placa]=NOTAS_MAESTRO[placa].filter(n=>!n.texto.startsWith(textoInicio));
  navigate('notas-m');
}

function descargarExcelNovedades(data){
  const cols=['Fecha','Placa','N° Interno','Marca y Modelo','Conductor','Resultado PDA','Novedad','Categoría','Sede','Plazo','Estado'];
  const rows=data.map(n=>[n.fecha,n.placa,n.interno,n.marca,n.conductor,n.resultado,n.novedad,n.cat,n.sede,n.plazo,n.estado]);
  const csv=[cols,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Novedades_PDA_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  const esUlt=insp.placa===ULTIMA_INSP.data.placa&&insp.fecha===ULTIMA_INSP.data.fecha&&insp.hora===ULTIMA_INSP.data.hora;
  if(!esUlt){alert('Solo se puede reimprimir el recibo de la última inspección.');return;}
  if((Date.now()-ULTIMA_INSP.timestamp)>3600000){alert('El plazo para reimprimir ha vencido (1 hora).');return;}
  const lab=insp.labrado?insp.labrado.split(' '):[];
  const llA=lab.filter(l=>parseFloat(l.split(':')[1])<=2.5).map(l=>({pos:l.split(':')[0],val:l.split(':')[1]}));
  imprimirTiquete(insp.placa,insp.resultado,{c1:insp.c1,c11:insp.c11,c2:insp.c2},lab,llA);

  else{
    h+='<div class="card"><div class="ct">Inspecciones PDA · todas las sedes</div><div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Sede</th><th>Inspector</th><th>Cat.1</th><th>Cat.1.1</th><th>Cat.2</th><th>Labrado</th><th>Resultado</th><th>Acta</th></tr></thead><tbody>';

function pgSinInsp(){
  const hMs=Date.now(),mes={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const pd=s=>{if(!s)return null;const p=s.trim().toLowerCase().split(' ');if(p.length===3){const d=parseInt(p[0]),m=mes[p[1]],y=parseInt(p[2]);if(!isNaN(d)&&m!==undefined&&!isNaN(y))return new Date(y,m,d).getTime();}return null;};
  const ui={};HISTORIAL_INSP.forEach(i=>{const ms=pd(i.fecha);if(ms&&(!ui[i.placa]||ms>ui[i.placa].ms))ui[i.placa]={fecha:i.fecha,sede:i.sede,inspector:i.inspector,resultado:i.resultado,ms};});
  const buses=Object.entries(BUSES).map(([pl,b])=>{const u=ui[pl];const dias=u?Math.floor((hMs-u.ms)/864e5):999;return{pl,b,u,dias};}).sort((a,b2)=>b2.dias-a.dias);
  const [s0,s3,s7,s15,s30]=[0,3,7,15,30].map((v,i,arr)=>buses.filter(x=>i===0?x.dias<3:i===1?x.dias>=3&&x.dias<7:i===2?x.dias>=7&&x.dias<15:i===3?x.dias>=15&&x.dias<30:x.dias>=30).length);
  let h='<p class="ptitle">Buses sin inspección reciente</p><p class="psub">Vehículos que llevan más días de los permitidos sin revisión PDA</p>';
  h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap"><span style="font-size:13px;color:#3d3a36">Mostrar buses sin inspección en más de:</span><div style="display:flex;gap:6px">${[3,7,15,30].map(d=>`<button onclick="filtrarSinInsp(${d},this)" id="btn-dias-${d}" class="btn${d===7?' bpri':''}" style="min-width:48px;justify-content:center">${d}d</button>`).join('')}</div><span style="font-size:12px;color:#6b6560" id="sin-insp-count"></span></div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px">${[['Al día','<3d',s0,'#1e6b3a'],['Atención','3-6d',s3,'#7a5a10'],['Alerta','7-14d',s7,'#9a4810'],['Crítico','15-29d',s15,'#a83020'],['Sin datos','30+d',s30,'#888']].map(([l,sb,v,c])=>`<div class="met" style="border-left:3px solid ${c}"><div class="mv" style="color:${c};font-size:20px">${v}</div><div class="ml">${l}</div><div style="font-size:9px;color:#6b6560">${sb}</div></div>`).join('')}</div>`;
  h+='<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Est.</th><th>Placa</th><th>Bus</th><th>Afiliado</th><th>Última insp.</th><th>Sede</th><th>Resultado</th><th>Días</th><th>Acción</th></tr></thead><tbody id="tbody-sin-insp">';
  buses.forEach(({pl,b,u,dias})=>{
    const c=dias<3?'#1e6b3a':dias<7?'#7a5a10':dias<15?'#9a4810':'#a83020';
    const sc=dias<3?'sg':dias<7?'sa':dias<15?'so':'sr';
    const res=u?u.resultado:'—';
    const pill=res==='APTO'?'<span class="pill pg">APTO</span>':res==='NO APTO'?'<span class="pill pr">NO APTO</span>':res.includes('NOV')?'<span class="pill pa">CON NOV.</span>':'<span class="pill pgr">Sin datos</span>';
    h+=`<tr data-dias="${dias}" style="${dias>=7?'':'display:none'}"><td><span class="sem ${sc}"></span></td><td style="font-weight:700">${pl}</td><td style="font-size:12px">${b.marca||''} ${b.modelo||''}</td><td style="font-size:12px;color:#1a1816">${b.propietario||'—'}</td><td style="font-size:12px">${u?.fecha||'—'}</td><td style="font-size:12px">${u?.sede||'—'}</td><td>${pill}</td><td><span style="font-size:13px;font-weight:700;color:${c};font-family:'DM Mono',monospace">${dias===999?'Sin reg.':dias+'d'}</span></td><td><button class="btn bsm" style="color:#7a5a10;border-color:rgba(251,191,36,.3)" onclick="(()=>{if(!NOTAS_MAESTRO['${pl}'])NOTAS_MAESTRO['${pl}']=[]; NOTAS_MAESTRO['${pl}'].push({tipo:'revision',texto:'Programar inspección PDA urgente',fecha:hoy(),autor:'Maestro'}); alert('Nota agregada para ${pl}');})()">📋</button></td></tr>`;
  });
  h+='</tbody></table></div>';
  if(!buses.length)h+='<div style="text-align:center;padding:32px;color:#6b6560">✅ Registra vehículos para ver este panel</div>';
  h+=`<div class="ib" style="margin-top:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Usa 📋 para dejar una nota automática al inspector.</div></div>`;
  h+=`<script>(function(){filtrarSinInsp(7,document.getElementById('btn-dias-7'));})();<\/script>`;
  return h;
}

function filtrarSinInsp(dias,btn){
  document.querySelectorAll('[id^="btn-dias-"]').forEach(b=>b.className=b.className.replace(' bpri',''));
  if(btn)btn.className+=' bpri';
  let count=0;
  document.querySelectorAll('#tbody-sin-insp tr').forEach(tr=>{const show=parseInt(tr.dataset.dias||0)>=dias;tr.style.display=show?'':'none';if(show)count++;});
  const el=document.getElementById('sin-insp-count');if(el)el.textContent=`${count} bus${count!==1?'es':''} encontrado${count!==1?'s':''}`;
}

// MODO SIN CONEXIÓN - OFFLINE MANAGER
// ══════════════════════════════════════════════
const OFFLINE_KEY = 'flotacontrol_pending_inspections';
const OFFLINE_RES_KEY = 'flotacontrol_offline_res';
const OFFLINE_FORM_KEY = 'flotacontrol_offline_form';

// Estado de conexión
let isOnline = navigator.onLine;

function initOfflineManager(){
  // Escuchar cambios de conexión
  window.addEventListener('online', handleOnline);
  window.addEventListener('offline', handleOffline);
  updateConnectionStatus();
  // Revisar si hay inspecciones pendientes de sync
  checkPendingSync();
}

function handleOnline(){
  isOnline = true;
  updateConnectionStatus();
  showSyncBanner();
  // Auto-sync si hay pending
  const pending = getPendingInspections();
  if(pending.length > 0){
    setTimeout(syncPendingInspections, 1000);
  }
}

function handleOffline(){
  isOnline = false;
  updateConnectionStatus();
  hideSyncBanner();
  // Mostrar aviso si el inspector está en el check list
  if(CR === 'inspector' && CP === 'nueva'){
    showOfflineAlert();
  }
}

function updateConnectionStatus(){
  const badge = document.getElementById('offline-badge');
  if(badge){
    badge.style.display = isOnline ? 'none' : 'flex';
  }
}

// ── GUARDAR FORMULARIO OFFLINE ──
function guardarFormularioOffline(){
  if(isOnline) return; // solo si está offline
  try{
    const formData = {
      placa: document.getElementById('fpl')?.value || '',
      conductor: document.getElementById('fcn')?.value || '',
      cc: document.getElementById('fcc')?.value || '',
      km: document.getElementById('fkm')?.value || '',
      hora_salida: document.getElementById('fhs')?.value || '',
      destino: document.getElementById('fds')?.value || '',
      timestamp: Date.now(),
    };
    localStorage.setItem(OFFLINE_FORM_KEY, JSON.stringify(formData));
    localStorage.setItem(OFFLINE_RES_KEY, JSON.stringify(RES));

    // Indicador visual
    const btn = document.getElementById('btn-guardar-offline');
    if(btn){
      btn.textContent = '💾 Guardado localmente';
      btn.style.color = '#1e6b3a';
      btn.style.borderColor = 'rgba(74,222,128,.3)';
    }
    console.log('Formulario guardado offline');
  } catch(e){
    console.warn('Error guardando offline:', e);
  }
}

// ── RECUPERAR FORMULARIO OFFLINE ──
function recuperarFormularioOffline(){
  try{
    const formData = JSON.parse(localStorage.getItem(OFFLINE_FORM_KEY) || 'null');
    const resData  = JSON.parse(localStorage.getItem(OFFLINE_RES_KEY)  || 'null');
    if(!formData) return false;

    // Calcular antigüedad
    const mins = Math.floor((Date.now() - formData.timestamp) / 60000);
    if(mins > 120){ // descartar si tiene más de 2 horas
      localStorage.removeItem(OFFLINE_FORM_KEY);
      localStorage.removeItem(OFFLINE_RES_KEY);
      return false;
    }

    // Restaurar campos
    ['fpl','fcn','fcc','fkm','fhs','fds'].forEach(id => {
      const el = document.getElementById(id);
      const key = {fpl:'placa',fcn:'conductor',fcc:'cc',fkm:'km',fhs:'hora_salida',fds:'destino'}[id];
      if(el && formData[key]) el.value = formData[key];
    });

    // Restaurar respuestas del check list
    if(resData){
      Object.assign(RES, resData);
    }

    // Si había placa, cargar datos del bus
    if(formData.placa){
      buscar(formData.placa);
    }

    return mins;
  } catch(e){
    console.warn('Error recuperando offline:', e);
    return false;
  }
}

// ── GUARDAR INSPECCIÓN PENDIENTE ──
function guardarInspeccionPendiente(inspeccion){
  try{
    const pending = getPendingInspections();
    pending.push({...inspeccion, pendingId: Date.now(), syncStatus: 'pending'});
    localStorage.setItem(OFFLINE_KEY, JSON.stringify(pending));
    console.log(`Inspección guardada offline. Total pendientes: ${pending.length}`);
  } catch(e){
    console.warn('Error guardando inspección offline:', e);
  }
}

function getPendingInspections(){
  try{
    return JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
  } catch(e){ return []; }
}

// ── SINCRONIZAR INSPECCIONES PENDIENTES ──
function syncPendingInspections(){
  const pending = getPendingInspections();
  if(pending.length === 0) return;

  let synced = 0;
  pending.forEach(insp => {
    // Agregar al historial local (simula envío al servidor)
    const {pendingId, syncStatus, ...cleanInsp} = insp;
    HISTORIAL_INSP.unshift(cleanInsp);
    // Agregar novedades al NOVEDADES_DATA
    if(insp.novedades && insp.novedades.length > 0){
      insp.novedades.forEach(n => NOVEDADES_DATA.push(n));
    }
    synced++;
  });

  // Limpiar pendientes
  localStorage.removeItem(OFFLINE_KEY);
  localStorage.removeItem(OFFLINE_FORM_KEY);
  localStorage.removeItem(OFFLINE_RES_KEY);

  // Notificar
  const banner = document.getElementById('sync-banner');
  if(banner){
    banner.style.display = 'flex';
    banner.className = 'sync-banner';
    banner.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
      <span><strong>${synced} inspección${synced!==1?'es':''} sincronizada${synced!==1?'s':''}</strong> correctamente al recuperar la conexión</span>
      <button onclick="this.parentElement.style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#1e6b3a;font-size:16px">×</button>`;
    setTimeout(() => { if(banner) banner.style.display='none'; }, 8000);
  }

  // Re-renderizar si está en actas
  if(CP === 'mis-actas') renderC();

  console.log(`${synced} inspecciones sincronizadas`);
}

function exportarTodoExcel(){
  // Construir CSV multi-hoja usando BOM + separadores
  const sep = ',';
  const nl  = '\n';
  const q   = v => '"' + String(v||'').replace(/"/g,'""') + '"';
  const row = arr => arr.map(q).join(sep);

  let csv = '';

  // HOJA 1: Inspecciones PDA
  if(document.getElementById('exp-insp')?.checked !== false){
    csv += 'HOJA: Inspecciones PDA' + nl;
    csv += row(['Fecha','Hora','Placa','Sede','Inspector','Cat. 1','Cat. 1.1','Cat. 2','Labrado llantas','Resultado']) + nl;
    if(HISTORIAL_INSP.length > 0){
      HISTORIAL_INSP.forEach(i => {
        csv += row([i.fecha,i.hora,i.placa,i.sede,i.inspector,i.c1,i.c11,i.c2,i.labrado||'',i.resultado]) + nl;
      });
    } else {
      csv += row(['Sin inspecciones registradas','','','','','','','','','']) + nl;
    }
    csv += nl;
  }

  // HOJA 2: Novedades
  if(document.getElementById('exp-nov')?.checked !== false){
    csv += 'HOJA: Novedades activas' + nl;
    csv += row(['Fecha','Placa','N° Interno','Conductor','Novedad','Categoría','Sede','Plazo','Estado']) + nl;
    if(NOVEDADES_DATA.length > 0){
      NOVEDADES_DATA.forEach(n => {
        csv += row([n.fecha,n.placa,n.interno||'',n.conductor||'',n.novedad,n.cat,n.sede,n.plazo,n.estado]) + nl;
      });
    } else {
      csv += row(['Sin novedades registradas','','','','','','','','']) + nl;
    }
    csv += nl;
  }

  // HOJA 3: Estado de flota
  if(document.getElementById('exp-buses')?.checked !== false){
    csv += 'HOJA: Estado de flota' + nl;
    csv += row(['Placa','N° Interno','Marca','Modelo','Año','Servicio','Afiliado','Última inspección','Sede','Resultado PDA','Labrado mín. (mm)','SOAT vence','CDA vence']) + nl;
    Object.entries(BUSES).forEach(([placa,b]) => {
      const ultima = [...HISTORIAL_INSP].filter(i=>i.placa===placa).slice(-1)[0];
      const labs = ultima?.labrado ? ultima.labrado.split(' ').map(l=>parseFloat(l.split(':')[1])||99) : [];
      const labMin = labs.length > 0 ? Math.min(...labs).toFixed(1) : '—';
      csv += row([placa,b.interno||'',b.marca||'',b.modelo||'',b.anio||'',b.servicio||'',b.propietario||'',ultima?.fecha||'Sin insp.',ultima?.sede||'',ultima?.resultado||'',labMin,b.soat||'',b.cda||'']) + nl;
    });
    csv += nl;
  }

  // HOJA 4: Llantas
  if(document.getElementById('exp-llantas')?.checked !== false){
    csv += 'HOJA: Reporte de llantas' + nl;
    csv += row(['Fecha','Placa','Inspector','Sede','Posición','Labrado (mm)','Alerta','Resultado inspección']) + nl;
    HISTORIAL_INSP.forEach(i => {
      if(!i.labrado) return;
      i.labrado.split(' ').forEach(l => {
        const pts = l.split(':');
        const val = parseFloat(pts[1]);
        const alerta = val <= 2 ? '⛔ Bajo mínimo legal' : val <= 2.5 ? '🔔 Próximo cambio' : val <= 4 ? '⚡ Desgaste' : '✓ OK';
        csv += row([i.fecha,i.placa,i.inspector,i.sede,pts[0],pts[1],alerta,i.resultado]) + nl;
      });
    });
    if(!HISTORIAL_INSP.some(i=>i.labrado)){
      csv += row(['Sin datos de labrado registrados','','','','','','','']) + nl;
    }
    csv += nl;
  }

  // HOJA 5: Resumen afiliados
  if(document.getElementById('exp-afil')?.checked !== false){
    csv += 'HOJA: Resumen por afiliado' + nl;
    csv += row(['Afiliado','Buses','Placas','Inspecciones PDA','Novedades activas','Buses aptos','Buses con novedad','Buses no aptos']) + nl;
    const af = {};
    Object.entries(BUSES).forEach(([pl,b]) => {
      const k = b.propietario || 'Afiliado';
      if(!af[k]) af[k] = {nombre:k,buses:[],insp:0,nov:0,ap:0,cn:0,na:0};
      af[k].buses.push(pl);
      const ultima = [...HISTORIAL_INSP].filter(i=>i.placa===pl).slice(-1)[0];
      if(ultima){
        af[k].insp++;
        if(ultima.resultado==='APTO') af[k].ap++;
        else if(ultima.resultado==='NO APTO') af[k].na++;
        else af[k].cn++;
      }
      af[k].nov += NOVEDADES_DATA.filter(n=>n.placa===pl&&n.estado==='Pendiente').length;
    });
    Object.values(af).forEach(a => {
      csv += row([a.nombre,a.buses.length,a.buses.join(' | '),a.insp,a.nov,a.ap,a.cn,a.na]) + nl;
    });
    if(!Object.keys(af).length) csv += row(['Sin afiliados registrados','','','','','','','']) + nl;
    csv += nl;
  }

  // Descargar
  const periodo = document.getElementById('exp-periodo')?.value || 'mes';
  const periodoLabel = periodo==='mes'?'MesActual':periodo==='trim'?'Trimestre':'Completo';
  const filename = `FlotaControl_${periodoLabel}_${new Date().toISOString().slice(0,10)}.csv`;
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

  // Feedback
  const btn = document.querySelector('[onclick="exportarTodoExcel()"]');
  if(btn){
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Descargando...';
    btn.style.background = 'rgba(74,222,128,.15)';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.background=''; }, 2500);
  }
}

          }).join('')}
        </div>
        ${labAlerta?`<div style="display:flex;align-items:center;gap:8px;margin-top:${modoMayor?'12px':'8px'};padding:${modoMayor?'10px 12px':'7px 10px'};background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3);border-radius:var(--radius)">
          <span style="font-size:${modoMayor?'20px':'16px'}">🔔</span>
          <div style="font-size:${modoMayor?'15px':'12px'};color:#9a4810;font-weight:600">Prepare el cambio de llantas · alguna posición está cerca del mínimo permitido (2mm)</div>
        </div>`:''}
      </div>`:'<div style="font-size:'+( modoMayor?'14px':'12px')+';color:#6b6560;padding:6px 0">Sin datos de labrado · próxima inspección registrará el labrado</div>'}

      <!-- Botones de acción -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:${modoMayor?'14px':'10px'}">
        <button onclick="navigate('nuevo-mant')" class="btn bpri" style="justify-content:center;padding:${modoMayor?'14px':'10px'};font-size:${modoMayor?'15px':'13px'}">
          ${S.plus} Registrar mantenimiento
        </button>
        <button onclick="navigate('novedades')" class="btn" style="justify-content:center;padding:${modoMayor?'14px':'10px'};font-size:${modoMayor?'15px':'13px'};${novs>0?'color:#a83020;border-color:rgba(248,113,113,.3)':''}">
          ${S.bel} Mis novedades ${novs>0?`<span style="font-size:${modoMayor?'13px':'11px'};padding:1px 6px;border-radius:20px;background:rgba(248,113,113,.15);color:#a83020">${novs}</span>`:''}
        </button>
      </div>
    </div>`;
  });

  return h;
}



// ══ DASHBOARD KM FLOTA ══
function pgDashKm(){
  let h='<p class="ptitle">Kilómetros de la flota</p>';
  h+='<p class="psub">Registro mensual acumulado · el km solo sube, nunca baja</p>';
  h+=`<div class="g4" style="margin-bottom:14px">
    <div class="met"><div class="mv">${Object.keys(BUSES).length}</div><div class="ml">Buses registrados</div></div>
    <div class="met"><div class="mv" style="font-size:18px">—</div><div class="ml">Km totales flota</div></div>
    <div class="met"><div class="mv" style="font-size:18px">—</div><div class="ml">Km promedio bus</div></div>
    <div class="met"><div class="mv" style="color:#1e6b3a">↑</div><div class="ml">Tendencia</div></div>
  </div>`;
  h+='<div class="card"><div class="ct">Evolución km mensual · ascendente</div>';
  h+=`<div class="ib" style="margin-bottom:12px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    El km de cada bus solo puede ser igual o mayor al último registrado. Si el inspector ingresa un valor menor, el sistema lo bloquea automáticamente.
  </div>`;
  // Build km table from HISTORIAL_INSP
  const kmPorBus = {};
  HISTORIAL_INSP.forEach(i=>{
    if(!kmPorBus[i.placa]) kmPorBus[i.placa] = [];
    kmPorBus[i.placa].push({fecha:i.fecha, km: ULTIMO_KM[i.placa]||0});
  });
  if(Object.keys(kmPorBus).length === 0){
    h+='<div style="text-align:center;padding:32px;color:#6b6560">Los datos de km aparecerán al registrar inspecciones con kilometraje</div>';
  } else {
    h+='<div class="tbl-wrap"><table><thead><tr><th>Placa</th><th>Km registrado</th><th>Última inspección</th><th>Tendencia</th></tr></thead><tbody>';
    Object.entries(kmPorBus).forEach(([placa, registros])=>{
      const ultimo = registros[registros.length-1];
      h+=`<tr><td style="font-weight:700">${placa}</td><td style="font-family:'DM Mono',monospace;font-weight:600">${(ULTIMO_KM[placa]||0).toLocaleString()} km</td><td>${ultimo.fecha}</td><td style="color:#1e6b3a">↑ Ascendente</td></tr>`;
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';
  return h;
}

// ══ DASHBOARD CONSUMO LLANTAS ══
function pgDashLlantas(){
  let llCrit=0, llAlerta=0, llOk=0;
  const porBus = {};
  HISTORIAL_INSP.forEach(i=>{
    if(!i.labrado) return;
    i.labrado.split(' ').forEach(l=>{
      const v=parseFloat(l.split(':')[1]);
      if(v<=2) llCrit++;
      else if(v<=2.5) llAlerta++;
      else llOk++;
    });
    if(!porBus[i.placa]){
      const labs=i.labrado.split(' ').map(l=>parseFloat(l.split(':')[1])||99);
      porBus[i.placa]={placa:i.placa,fecha:i.fecha,minLab:Math.min(...labs).toFixed(1),labrado:i.labrado};
    }
  });

  let h='<p class="ptitle">Consumo de llantas · tendencia de desgaste</p>';
  h+='<p class="psub">Seguimiento de labrado por vehículo · histórico de todas las inspecciones</p>';
  h+=`<div class="g4" style="margin-bottom:14px">
    <div class="met"><div class="mv" style="color:#a83020">${llCrit}</div><div class="ml">Posiciones ≤ 2mm ⛔</div></div>
    <div class="met"><div class="mv" style="color:#9a4810">${llAlerta}</div><div class="ml">Posiciones ≤ 2.5mm 🔔</div></div>
    <div class="met"><div class="mv" style="color:#1e6b3a">${llOk}</div><div class="ml">Posiciones OK</div></div>
    <div class="met"><div class="mv">${Object.keys(porBus).length}</div><div class="ml">Buses con labrado</div></div>
  </div>`;

  if(Object.keys(porBus).length === 0){
    h+='<div class="card" style="text-align:center;padding:32px;color:#6b6560">Los datos aparecerán al registrar inspecciones con labrado de llantas</div>';
    return h;
  }

  h+='<div class="card"><div class="ct">Buses con mayor desgaste · prioridad de cambio</div>';
  h+='<div class="tbl-wrap"><table><thead><tr><th>Placa</th><th>Labrado mínimo</th><th>Detalle por posición</th><th>Última insp.</th><th>Alerta</th></tr></thead><tbody>';
  Object.values(porBus).sort((a,b)=>parseFloat(a.minLab)-parseFloat(b.minLab)).forEach(b=>{
    const v=parseFloat(b.minLab);
    const col=v<=2?'#a83020':v<=2.5?'#9a4810':v<=4?'#7a5a10':'#1e6b3a';
    const alerta=v<=2?'<span class="pill pr">⛔ Bajo mínimo</span>':v<=2.5?'<span class="pill po">🔔 Cambio próximo</span>':v<=4?'<span class="pill pa">⚡ Desgaste</span>':'<span class="pill pg">✓ OK</span>';
    h+=`<tr>
      <td style="font-weight:700">${b.placa}</td>
      <td style="font-size:15px;font-weight:700;color:${col};font-family:'DM Mono',monospace">${b.minLab}mm</td>
      <td style="font-size:11px;font-family:'DM Mono',monospace;color:#3d3a36">${b.labrado}</td>
      <td style="font-size:12px">${b.fecha}</td>
      <td>${alerta}</td>
    </tr>`;
  });
  h+='</tbody></table></div></div>';
  return h;
}

// ══ FILTRAR ACTAS INSPECTOR ══
function filtrarActas(){
  const placa=(document.getElementById('busq-placa')?.value||'').toUpperCase();
  const res=document.getElementById('busq-res')?.value||'';
  const sede=document.getElementById('busq-sede')?.value||'';
  document.querySelectorAll('#tbody-actas tr').forEach(tr=>{
    const ok=(!placa||tr.dataset.placa?.includes(placa))&&
              (!res||tr.dataset.res===res)&&
              (!sede||tr.dataset.sede===sede);
    tr.style.display=ok?'':'none';
  });
}

    <div class="met"><div class="mv" style="color:#a83020">${c1}</div><div class="ml">Cat. 1</div></div>

    <div class="met"><div class="mv" style="color:#9a4810">${c2}</div><div class="ml">Cat. 2</div></div>

    <div class="ct" style="margin-bottom:0">Novedades registradas</div>
    <div style="display:flex;gap:8px">
      <button class="btn bpri" onclick="descargarExcelNovedades(NOVEDADES_DATA)">${S.dl} Descargar todo</button>
      <button class="btn" onclick="descargarExcelNovedades(NOVEDADES_DATA.filter(n=>n.cat==='Cat. 1'))">${S.dl} Cat. 1</button>
    </div>
  </div>`;
  if(!NOVEDADES_DATA.length) h+='<div style="text-align:center;padding:32px;color:#6b6560">Sin novedades registradas aún</div>';
  else{
    h+='<div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Placa</th><th>Novedad</th><th>Cat.</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>';
    NOVEDADES_DATA.forEach(n=>{
      const cp=n.cat==='Cat. 1'?'<span class="pill pr">Cat. 1</span>':n.cat==='Cat. 1.1'?'<span class="pill pa">Cat. 1.1</span>':'<span class="pill po">Cat. 2</span>';
      h+=`<tr><td>${n.fecha}</td><td style="font-weight:600">${n.placa}</td><td>${n.novedad}</td><td>${cp}</td><td>${n.resultado==='NO APTO'?'<span class="pill pr">NO APTO</span>':'<span class="pill pa">CON NOV.</span>'}</td><td><span class="pill pgr">${n.estado}</span></td></tr>`;
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';
  return h;
}


// ══ HELPERS MÓDULO MANTENIMIENTO (para MANT_PAGES) ══
function selectBus(el, placa){
  document.querySelectorAll('.veh-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

function selectCat(el, color, cat){
  document.querySelectorAll('.cat-btn').forEach(c=>{c.className='cat-btn';});
  el.classList.add('selected-'+color);
  const tipos={
    correctivo:['Reparación de motor','Cambio de frenos dañados','Reparación eléctrica','Reparación transmisión','Cambio de bomba de agua','Reparación sistema neumático','Otro correctivo'],
    preventivo:['Cambio de aceite de motor','Cambio de filtros','Revisión de frenos','Cambio de llantas','Alineación y balanceo','Revisión de batería','Cambio correa de distribución','Revisión sistema neumático','Revisión puertas automáticas','Revisión general','Otro preventivo'],
    predictivo:['Diagnóstico escáner OBD','Análisis de aceite','Inspección de desgaste','Revisión de vibraciones','Termografía','Otro predictivo']
  };
  const sel=document.getElementById('tipo-select');
  if(sel) sel.innerHTML=(tipos[cat]||[]).map(t=>`<option>${t}</option>`).join('');
}

function toggleNuevoBus(){
  const f=document.getElementById('form-nuevo-bus');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}

function guardarNuevoBus(){
  const placa=document.getElementById('nb-placa')?.value?.trim();
  const interno=document.getElementById('nb-interno')?.value?.trim();
  const modelo=document.getElementById('nb-modelo')?.value?.trim();
  const anio=document.getElementById('nb-anio')?.value?.trim();
  if(!placa||!interno||!modelo||!anio){alert('Por favor completa todos los campos.');return;}
  const tbody=document.getElementById('tbody-buses');
  if(tbody){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="sem sg"></span></td><td>${placa}</td><td>${interno}</td><td>${modelo} ${anio}</td><td>Sin asignar</td><td>Sin registros</td><td><button class="btn btn-sm">Editar</button></td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('form-nuevo-bus').style.display='none';
  alert('Bus '+placa+' registrado correctamente.');
}

function showBuses(nombre, cedula, buses){
  const panel=document.getElementById('buses-panel');
  const title=document.getElementById('buses-title');
  const list=document.getElementById('buses-list');
  if(!panel||!title||!list) return;
  title.textContent=nombre+' · CC '+cedula+' · '+buses.length+' bus(es)';
  list.innerHTML=buses.map(b=>{
    const [placa,interno,modelo,sem,fecha]=b.split('|');
    const semColor={'s-green':'#1e6b3a','s-amber':'#7a5a10','s-red':'#a83020'}[sem]||'#6b6560';
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 10px;background:#d8d4cc;border-radius:var(--radius);margin-bottom:6px">
      <span class="sem ${sem}" style="flex-shrink:0"></span>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${placa}</div><div style="font-size:11px;color:#3d3a36">N° ${interno} · ${modelo}</div></div>
      <div style="text-align:right;font-size:11px;color:#6b6560">Último: ${fecha}</div>
    </div>`;
  }).join('');
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showPreview(input){
  const file=input?.files?.[0];
  if(!file) return;
  const chip=document.createElement('div');
  chip.className='file-chip';
  chip.innerHTML=`<span>${file.name}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#6b6560;margin-left:4px">×</button>`;
  const dz=input.closest('.dropzone');
  if(dz) dz.appendChild(chip);
}
